<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FYI Social ∞ - 2035 Cyber Dashboard</title>
  
  <!-- Satoshi Font -->
  <link rel="stylesheet" href="../assets/fonts/Satoshi/satoshi.css">
  
  <!-- Global Styles -->
  <link rel="stylesheet" href="../shared/ui/styles/globals.css">
  <link rel="stylesheet" href="../shared/ui/styles/animations.css">
  
  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="./styles/tailwind.css">
  
  <style>
    /* Inline critical CSS for instant load */
    body {
      margin: 0;
      font-family: 'Satoshi', system-ui, sans-serif;
      background: linear-gradient(180deg, #0a0a1f 0%, #000000 100%);
      color: #ffffff;
      overflow-x: hidden;
    }
    
    #root {
      width: 100%;
      min-height: 100vh;
    }
    
    /* Loading state */
    .loader {
      width: 48px;
      height: 48px;
      border: 5px solid #00f2ff;
      border-bottom-color: transparent;
      border-radius: 50%;
      animation: rotation 1s linear infinite;
    }
    
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root">
    <!-- Loading fallback -->
    <div style="display: flex; align-items: center; justify-center; min-height: 100vh;">
      <div class="loader"></div>
    </div>
  </div>
  
  <!-- React App -->
  <script type="module" src="./App.jsx"></script>
</body>
</html>
