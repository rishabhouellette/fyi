<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Infinity symbol with glowing gradient -->
  <path d="M 60 100 
           C 60 70, 40 50, 20 50
           C 0 50, 0 70, 0 100
           C 0 130, 0 150, 20 150
           C 40 150, 60 130, 60 100
           
           M 60 100
           C 60 130, 80 150, 100 150
           C 120 150, 140 130, 140 100
           C 140 70, 120 50, 100 50
           C 80 50, 60 70, 60 100"
        transform="translate(30, 0) scale(1.3)"
        fill="none" 
        stroke="url(#cyberGradient)" 
        stroke-width="12" 
        stroke-linecap="round"
        filter="url(#glow)"/>
</svg>
