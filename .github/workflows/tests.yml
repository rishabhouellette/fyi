name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check syntax with py_compile
      run: |
        python -m py_compile core/config.py
        python -m py_compile core/utils.py
        python -m py_compile core/models.py
        python -m py_compile services/accounts.py
        python -m py_compile services/platforms.py
        python -m py_compile services/scheduler.py
        python -m py_compile routes/api_routes.py
        python -m py_compile routes/ai_routes.py
        python -m py_compile routes/media_routes.py
        python -m py_compile app_db.py
    
    - name: Run import validation
      run: |
        python -c "import sys; sys.path.insert(0, '.'); import web_server; print('✓ All imports successful')"
    
    - name: Run smoke tests
      run: |
        python scripts/smoke_test_web_server.py
      continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff black isort
    
    - name: Check formatting with black
      run: black --check --line-length 120 . --exclude venv/
      continue-on-error: true
    
    - name: Check imports with isort
      run: isort --check-only . --skip venv/
      continue-on-error: true
    
    - name: Lint with ruff
      run: ruff check . --exclude venv/
      continue-on-error: true
