version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: fyi_app
    restart: unless-stopped
    environment:
      # Public base URL used by Instagram publishing so Meta can fetch /uploads/{file_id}
      # Must be public HTTPS.
      FYI_PUBLIC_BASE_URL: "https://viralclip.tech"

      # Allow your domain (and optionally www) for browser access.
      FYI_ALLOWED_ORIGINS: "https://viralclip.tech,https://www.viralclip.tech"

      # Scheduler on by default
      FYI_SCHEDULER_ENABLED: "1"
      FYI_SCHEDULER_POLL_SECONDS: "10"

      # OAuth redirect should be your public domain.
      # NOTE: Ensure Meta developer console has this exact URL whitelisted.
      FYI_OAUTH_REDIRECT: "https://viralclip.tech/oauth/callback"

      # Load secrets from .env on the server (you will create it).
      # FB_APP_ID, FB_APP_SECRET, etc.
    env_file:
      - ./.env
    volumes:
      # Persist DB + uploads between restarts
      - ../data:/app/data
      - ../accounts:/app/accounts
    expose:
      - "8000"

  nginx:
    image: nginx:1.25-alpine
    container_name: fyi_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot:latest
    container_name: fyi_certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c"
    command: >
      "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

