# Nginx reverse proxy for FYI web portal
# - Terminates TLS (handled by Certbot in the companion container)
# - Proxies to the app container

server {
    listen 80;
    server_name viralclip.tech www.viralclip.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name viralclip.tech www.viralclip.tech;

    ssl_certificate     /etc/letsencrypt/live/viralclip.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/viralclip.tech/privkey.pem;

    # Reasonable defaults
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 4G;

    # Proxy to app
    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets / SSE friendly
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
